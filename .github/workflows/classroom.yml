name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile
      id: compile
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Compile"
        setup-command: ''
        command: javac TempConverter.java
        timeout: 1
        max-score: 10

    - name: Header - Name
      id: header_name
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Header: Name filled in"
        setup-command: ''
        command: grep -qE "\*\s*Name:\s*\S+" TempConverter.java
        timeout: 1
        max-score: 2

    - name: Header - Block
      id: header_block
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Header: Block filled in"
        setup-command: ''
        command: grep -qE "\*\s*Block:\s*\S+" TempConverter.java
        timeout: 1
        max-score: 2

    - name: Header - Date
      id: header_date
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Header: Date filled in"
        setup-command: ''
        command: grep -qE "\*\s*Date:\s*\S+" TempConverter.java
        timeout: 1
        max-score: 1

    - name: test1 (70°F)
      id: test1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "test1: 70°F converts correctly"
        setup-command: ''
        command: echo '70' | java TempConverter | grep -q '21.1'
        timeout: 1
        max-score: 10

    - name: test2 (32°F)
      id: test2
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "test2: 32°F converts correctly"
        setup-command: ''
        command: echo '32' | java TempConverter | grep -q '0.0'
        timeout: 1
        max-score: 10

    - name: test3 (0°F)
      id: test3
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "test3: 0°F converts correctly"
        setup-command: ''
        command: echo '0' | java TempConverter | grep -q '17.7'
        timeout: 1
        max-score: 10

    - name: test4 (102°F)
      id: test4
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "test4: 102°F converts correctly"
        setup-command: ''
        command: echo '102' | java TempConverter | grep -q '38.8'
        timeout: 1
        max-score: 10

    - name: test5 (-32°F)
      id: test5
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "test5: -32°F converts correctly"
        setup-command: ''
        command: echo '-32' | java TempConverter | grep -q '35.5'
        timeout: 1
        max-score: 10

    - name: last test (212°F)
      id: lasttest
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "last test: 212°F converts correctly"
        setup-command: ''
        command: echo '212' | java TempConverter | grep -q '100.0'
        timeout: 1
        max-score: 15

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        COMPILE_RESULTS: "${{steps.compile.outputs.result}}"
        HEADER_NAME_RESULTS: "${{steps.header_name.outputs.result}}"
        HEADER_BLOCK_RESULTS: "${{steps.header_block.outputs.result}}"
        HEADER_DATE_RESULTS: "${{steps.header_date.outputs.result}}"
        TEST1_RESULTS: "${{steps.test1.outputs.result}}"
        TEST2_RESULTS: "${{steps.test2.outputs.result}}"
        TEST3_RESULTS: "${{steps.test3.outputs.result}}"
        TEST4_RESULTS: "${{steps.test4.outputs.result}}"
        TEST5_RESULTS: "${{steps.test5.outputs.result}}"
        LASTTEST_RESULTS: "${{steps.lasttest.outputs.result}}"
      with:
        runners: compile,header_name,header_block,header_date,test1,test2,test3,test4,test5,lasttest
